---
apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-config
  namespace: bugbounty
data:
  # --- 从这里设置所有环境变量，相当于 .env 文件 ---
  # 数据库（K8s 里建议用 PostgreSQL，SQLite 不支持多副本）
  DATABASE_URL: "sqlite:///./data/orchestrator.db"
  # PostgreSQL 示例: "postgresql://user:pass@postgres-service:5432/orchestrator"

  # Redis（K8s 内部 Service 名）
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"

  # LLM（必填！）
  LLM_API_BASE: "https://api.openai.com/v1"
  LLM_API_KEY: "sk-your-key-here"
  LLM_MODEL: "gpt-4o"

  # 工具路径
  SUBFINDER_PATH: "/usr/local/bin/subfinder"
  STRIX_PATH: "/usr/local/bin/strix"
  NAABU_PATH: "/usr/local/bin/naabu"

  # 超时
  SUBDOMAIN_TIMEOUT: "600"
  DNS_RESOLVE_TIMEOUT: "300"
  STRIX_SCAN_TIMEOUT: "7200"
  PORT_SCAN_TIMEOUT: "300"

  # 并发
  DNS_CONCURRENCY: "50"
  SUBDOMAIN_CONCURRENCY: "5"

  # Web 密码（强烈建议在公网暴露时设置！）
  WEB_PASSWORD: ""
