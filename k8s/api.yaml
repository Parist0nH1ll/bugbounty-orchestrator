---
# FastAPI 后端
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: bugbounty
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: orchestrator-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: orchestrator-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: orchestrator-data
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: bugbounty
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
