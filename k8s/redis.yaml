---
# Redis - 单节点部署（生产环境建议用云厂商托管 Redis，去掉此文件）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: bugbounty
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: bugbounty
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
