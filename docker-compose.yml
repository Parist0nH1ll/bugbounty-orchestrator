version: "3.8"

services:
  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==================== FastAPI ====================
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./scan_results:/app/scan_results
      - ./output:/app/output
    depends_on:
      redis:
        condition: service_healthy
    command: ["/app/scripts/entrypoint.api.sh"]

  # ==================== Celery Worker ====================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./scan_results:/app/scan_results
      - ./output:/app/output
      # docker.sock: strix 需要 Docker 沙箱 (ghcr.io/usestrix/strix-sandbox)
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    command: ["/app/scripts/entrypoint.worker.sh"]

  # ==================== Streamlit 前端 ====================
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./scan_results:/app/scan_results
    depends_on:
      - api
    command: ["streamlit", "run", "streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]

volumes:
  redis_data:
